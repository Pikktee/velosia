<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Gradient for brand colors (Teal to Pink) -->
    <linearGradient id="vintamie-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09b0b7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Neon glow effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background Plate (helps contrast in browser tabs and PWA icons) -->
  <rect width="512" height="512" rx="112" fill="#07090d" />

  <!-- Futuristic Radar/Scanner Orbit Ring -->
  <circle cx="256" cy="260" r="185" stroke="url(#vintamie-grad)" stroke-width="4" stroke-dasharray="16 8" opacity="0.25" />
  <circle cx="256" cy="260" r="165" stroke="url(#vintamie-grad)" stroke-width="6" opacity="0.4" />

  <!-- Hanging Loop connecting Camera to Tag -->
  <path d="M256 314 v62" stroke="url(#vintamie-grad)" stroke-width="12" stroke-linecap="round" />

  <!-- Hanging Tag at Bottom -->
  <path d="M236 376 h40 l15 25 v65 c0 8.8 -7.2 16 -16 16 h-54 c-8.8 0 -16 -7.2 -16 -16 v-65 z" fill="#07090d" stroke="url(#vintamie-grad)" stroke-width="12" stroke-linejoin="round" />
  <circle cx="256" cy="396" r="6" fill="url(#vintamie-grad)" />

  <!-- Camera Body -->
  <path d="M156 190 h40 l15-25 h90 l15 25 h40 c13.2 0 24 10.8 24 24 v100 c0 13.2-10.8 24-24 24 h-200 c-13.2 0-24-10.8-24-24 v-100 c0-13.2 10.8-24 24-24 z" fill="#07090d" stroke="url(#vintamie-grad)" stroke-width="12" stroke-linejoin="round" />
  
  <!-- Camera Flash -->
  <circle cx="325" cy="215" r="8" fill="#09b0b7" />

  <!-- Camera Lens (AI Eye) -->
  <circle cx="256" cy="254" r="48" stroke="url(#vintamie-grad)" stroke-width="12" fill="#0e121a" />
  <circle cx="256" cy="254" r="22" fill="url(#vintamie-grad)" />
  <circle cx="270" cy="240" r="6" fill="#fff" opacity="0.8" />

  <!-- Neon Sparkles -->
  <!-- Top Right Large Sparkle -->
  <path d="M390 120 c0 15 -10 25 -25 25 c15 0 25 10 25 25 c0 -15 10 -25 25 -25 c -15 0 -25 -10 -25 -25 z" fill="#ec4899" filter="url(#neon-glow)" />
  
  <!-- Left Medium Sparkle -->
  <path d="M120 280 c0 12 -8 20 -20 20 c12 0 20 8 20 20 c0 -12 8 -20 20 -20 c-12 0-20-8-20-20 z" fill="#09b0b7" filter="url(#neon-glow)" />
  
  <!-- Top Left Small Sparkle -->
  <path d="M175 105 c0 8 -5 12 -12 12 c7 0 12 5 12 12 c0 -7 5 -12 12 -12 c-7 0-12-5-12-12 z" fill="#09b0b7" />
  
  <!-- Bottom Right Small Sparkle -->
  <path d="M340 330 c0 8 -5 12 -12 12 c7 0 12 5 12 12 c0 -7 5 -12 12 -12 c-7 0-12-5-12-12 z" fill="#ec4899" />
</svg>