<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vintamie Camera</title>
  <link rel="stylesheet" href="camera.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="camera-container">
    <!-- Close button -->
    <button id="btn-close" class="btn-circle btn-close" aria-label="Kamera schließen">✕</button>

    <!-- Video Feed -->
    <div class="video-wrapper">
      <video id="video" autoplay playsinline></video>
      <div class="camera-guideline">
        <div class="guideline-box"></div>
        <p class="guideline-text">Positioniere den Artikel im Rahmen</p>
      </div>
    </div>

    <!-- Canvas for capturing -->
    <canvas id="canvas" style="display:none;"></canvas>

    <!-- Camera Controls -->
    <div class="controls-overlay">
      <div class="controls-row">
        <!-- Gallery picker fallback -->
        <label for="file-input" class="btn-circle btn-gallery" title="Aus Galerie wählen">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </label>
        <input type="file" id="file-input" accept="image/*" style="display:none;">

        <!-- Main Shutter Button -->
        <button id="btn-shutter" class="btn-shutter" title="Foto aufnehmen">
          <div class="shutter-inner"></div>
        </button>

        <!-- Spacer to balance row -->
        <div class="control-spacer"></div>
      </div>
    </div>

    <!-- Glassmorphic Loading Overlay -->
    <div id="loader" class="loader-overlay" style="display:none;">
      <div class="loader-content">
        <div class="spinner">
          <div class="spinner-ring"></div>
          <span class="sparkle">✨</span>
        </div>
        <h3>Analysiere Artikel</h3>
        <p>Vintamie KI beschreibt deinen Artikel und schätzt den Preis...</p>
        <div id="loader-status" class="loader-status">Foto wird hochgeladen...</div>
      </div>
    </div>

    <!-- Error Alert Banner -->
    <div id="error-banner" class="error-banner" style="display:none;">
      <span id="error-message">Fehler aufgetreten.</span>
      <button id="btn-error-close" class="btn-error-close">OK</button>
    </div>
  </div>

  <script src="camera.js"></script>
</body>
</html>
